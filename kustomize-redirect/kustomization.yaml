# Kustomize Redirect: renders the vendor's parent Helm chart, then JSON Patches
# the Application CRs to redirect child apps to our overlays.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmGlobals:
  chartHome: charts

helmCharts:
  - name: cots-platform
    version: 1.0.0
    releaseName: cots
    namespace: openshift-gitops

patches:
  # Redirect each child Application to our Kustomize overlay and remove the
  # helm config so ArgoCD detects the source as Kustomize (not Helm)
  - target:
      kind: Application
      name: cots-frontend
    patch: |
      - op: replace
        path: /spec/source/path
        value: kustomize-redirect/child-frontend
      - op: remove
        path: /spec/source/helm

  - target:
      kind: Application
      name: cots-api
    patch: |
      - op: replace
        path: /spec/source/path
        value: kustomize-redirect/child-api
      - op: remove
        path: /spec/source/helm

  - target:
      kind: Application
      name: cots-worker
    patch: |
      - op: replace
        path: /spec/source/path
        value: kustomize-redirect/child-worker
      - op: remove
        path: /spec/source/helm
