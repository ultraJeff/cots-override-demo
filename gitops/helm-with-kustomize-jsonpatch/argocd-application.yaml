# Deployment Method 3: Helm with Kustomize JSON Patch
#
# Single-source Kustomize app that renders the vendor's parent Helm chart
# via helmCharts, then JSON Patches the rendered Application CRs to redirect
# each child app to our child-overlays. The child overlays wrap the vendor
# child charts with their own Kustomize + JSON Patch for securityContext fixes.
#
# Preserves the vendor's app-of-apps topology. No Kyverno needed.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cots-platform-helm-kustomize
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/ultraJeff/cots-override-demo.git
    targetRevision: main
    path: gitops/helm-with-kustomize-jsonpatch/overlays/ocp
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
