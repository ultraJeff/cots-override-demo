# Renders the vendor's parent Helm chart via Kustomize, then JSON Patches
# the Application CRs it produces to redirect child apps to our overlays.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmGlobals:
  chartHome: ../../../../fake-cots-charts

helmCharts:
  - name: cots-platform
    releaseName: cots
    namespace: openshift-gitops

patches:
  # Redirect each child Application to our overlay instead of the raw chart
  - target:
      kind: Application
      name: cots-frontend
    patch: |
      - op: replace
        path: /spec/source/path
        value: gitops/helm-with-kustomize-jsonpatch/child-overlays/frontend

  - target:
      kind: Application
      name: cots-api
    patch: |
      - op: replace
        path: /spec/source/path
        value: gitops/helm-with-kustomize-jsonpatch/child-overlays/api

  - target:
      kind: Application
      name: cots-worker
    patch: |
      - op: replace
        path: /spec/source/path
        value: gitops/helm-with-kustomize-jsonpatch/child-overlays/worker
