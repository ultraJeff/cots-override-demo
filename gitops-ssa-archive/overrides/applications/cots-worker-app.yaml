# Patches the vendor-created Application CR to add ignoreDifferences
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cots-worker
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/ultraJeff/cots-override-demo.git
    targetRevision: main
    path: fake-cots-charts/cots-worker
    helm:
      releaseName: cots
  destination:
    server: https://kubernetes.default.svc
    namespace: cots-platform
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/spec/securityContext
        - /spec/template/spec/containers/0/securityContext
        - /spec/template/spec/containers/0/resources
  syncPolicy:
    syncOptions:
      - RespectIgnoreDifferences=true
